<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Психологічні тести | MindCare</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html"><span class="brand-mark">MC</span><span>MindCare</span></a>
    <button class="nav-toggle" type="button" aria-label="Відкрити меню" aria-expanded="false">☰</button>
    <nav class="site-nav" aria-label="Основна навігація">
      <a href="index.html">Головна</a>
      <a href="stories.html">Дописи</a>
      <a class="active" href="tests.html">Тести</a>
      <a href="bot.html">AI психолог</a>
      <a href="resources.html">Допомога</a>
    </nav>
  </header>

  <main class="page-shell">
    <section class="page-title">
      <p class="eyebrow">Самоспостереження</p>
      <h1>Психологічні тести</h1>
      <p>Це не діагностика, а спосіб помітити свій стан. Відповідай чесно, як відчуваєш саме зараз.</p>
    </section>

    <section id="testsMenu" class="tests-grid" aria-label="Список тестів"></section>

    <section id="testArea" class="test-area hidden" aria-live="polite">
      <div class="test-progress">
        <a class="text-button" href="index.html">← Головна</a>
        <button class="text-button" type="button" id="backToTests">До списку тестів</button>
        <span id="progressText">Питання 1 з 10</span>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <h2 id="questionText"></h2>
      <div id="answers" class="answer-grid"></div>
      <div id="result" class="result-panel hidden"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>MindCare © 2026. Освітній сайт про психологічну підтримку.</p>
  </footer>
</body>
</html>
